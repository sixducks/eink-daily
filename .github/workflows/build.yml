name: Build APK

# 每次 push 到 main/master，或手动点按钮，都会自动编译
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # 允许把 APK 发布到 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Gradle 8.2
        run: |
          curl -sSL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$HOME"
          echo "$HOME/gradle-8.2/bin" >> "$GITHUB_PATH"

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      # 方式一：在 Actions 运行详情页直接下载 APK
      - name: 上传 APK（Artifact）
        uses: actions/upload-artifact@v4
        with:
          name: EinkDaily-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 方式二：自动挂到仓库的 Release（tag 名 latest，每次覆盖更新）
      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 最新构建
          files: app/build/outputs/apk/debug/app-debug.apk
